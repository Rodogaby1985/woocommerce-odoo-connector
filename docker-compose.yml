version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  middleware:
    build: .
    env_file:
      - .env
    depends_on:
      - redis
    ports:
      - "8000:8000"

  worker:
    build: .
    command: celery -A connector.tasks.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
